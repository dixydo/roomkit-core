name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build, vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "::error::These files need gofmt:"; echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

  sdk:
    name: Build SDK (${{ matrix.pkg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [sdk, sdk-react, sdk-vue]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # The React/Vue wrappers depend on the vanilla SDK via `file:../sdk`,
      # so build it first to make its dist/ available.
      - name: Build core SDK dependency
        if: matrix.pkg != 'sdk'
        working-directory: sdk
        run: npm ci && npm run build

      - name: Build ${{ matrix.pkg }}
        working-directory: ${{ matrix.pkg }}
        run: npm ci && npm run build
