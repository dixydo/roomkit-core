name: Feature request
description: Suggest an enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        roomkit deliberately stays small. Proposals that keep it readable
        end-to-end are easiest to accept — see the FAQ in the README for scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not just the feature.
      placeholder: When deploying behind X, I can't ... because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like roomkit to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Reverse-proxy tricks, existing config, other tools, etc.
